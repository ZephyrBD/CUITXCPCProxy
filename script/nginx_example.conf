map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    #放行domjudge的API接口
    location /dj/api {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        proxy_pass http://127.0.0.1:5881/dj/api;
        proxy_redirect off;
    }
    location /dj {
        #直接访问Domjudge会被拒绝
        if ($cookie_dj_auth != "ok") {
           return 403;
        }
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        #domjudge实际位置
        proxy_pass http://127.0.0.1:5881/dj;
        proxy_redirect off;
    }
    #配置中的org.domjudge.nginx-verify-route-path

    location /dj-verify {
        if ($arg_token = "") { return 403; }
        if ($arg_token = "null") { return 403; }

        # 鉴权子请求
        auth_request /auth-check;
        try_files /__never_exists__ @dj_redirect;
    }

    location @dj_redirect {
        add_header Set-Cookie "dj_auth=ok; Path=/; HttpOnly; SameSite=Lax" always;
        return 302 /dj;
    }
    location = /auth-check {
        internal;

        # 把 token 直接转发给TOOL
        proxy_set_header Content-Length "";
        proxy_pass_request_body off;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-URI $request_uri;

        #填写你实际的TOOL地址
        #/cxtool/public/auth/validate是接口，不修改
        proxy_pass http://127.0.0.1:8080/cxtool/public/auth/validate;
    }
}