name: buildAll
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 运行环境
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: pull project codes
        uses: actions/checkout@v4

      # 设置 Java 环境
      - name: set JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          cache: gradle

      # 设置 Node.js 环境
      - name: set Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './vue/package-lock.json'

      # 构建 Vue 前端
      - name: build Vue
        working-directory: ./vue
        run: |
          npm install
          npm run build

      # 给Gradle执行权限
      - name: chmod Gradle
        run: chmod +x ./gradlew

      # 构建 SpringBoot Jar 包
      - name: build Jar
        run: ./gradlew clean build -x test

      # 上传Jar包（可直接下载使用）
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar