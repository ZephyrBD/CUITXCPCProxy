<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            width: 400px;
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .input-item {
            margin-bottom: 20px;
        }
        .input-item input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            height: 45px;
            background-color: #409eff;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 17px;
            cursor: pointer;
        }
        .login-btn:hover {
            background-color: #66b1ff;
        }
        .tip {
            margin-top: 15px;
            font-size: 14px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>后台管理员登录</h2>
    <div class="input-item">
        <input type="text" id="examNum" placeholder="请输入管理员账号">
    </div>
    <div class="input-item">
        <input type="password" id="pwd" placeholder="请输入登录密码">
    </div>
    <button class="login-btn" onclick="login()">立即登录</button>
</div>

<script>
    // 对接后端 GET /login 接口
    function login() {
        let examNum = document.getElementById('examNum').value.trim();
        let pwd = document.getElementById('pwd').value.trim();

        if (!examNum || !pwd) {
            alert('考号和密码不能为空！');
            return;
        }

        // 拼接GET请求，直接跳转登录
        let url = `/cxtool/admin/login?examNum=${examNum}&password=${pwd}`;
        window.location.href = url;
    }
</script>

</body>
</html>
